<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Odoo — SexFun</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 720px; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .status { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; margin-bottom: 1.25rem; font-size: 13px; color: #555; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .dot.green { background: #4caf50; }
  .dot.red { background: #e53935; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .chip { font-size: 12px; padding: 6px 14px; border-radius: 99px; border: 1px solid #ddd; color: #555; cursor: pointer; background: #fff; }
  .chip:hover { background: #f0f0f0; color: #111; }
  .input-area { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 14px; margin-bottom: 1.25rem; }
  textarea { width: 100%; font-size: 14px; border: none; outline: none; resize: none; height: 72px; font-family: inherit; color: #1a1a1a; background: transparent; }
  .input-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
  button.send { padding: 8px 20px; border-radius: 8px; border: none; background: #1a1a1a; color: #fff; font-size: 14px; cursor: pointer; }
  button.send:hover { background: #333; }
  button.send:disabled { opacity: 0.4; cursor: not-allowed; }
  .messages { display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 14px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; }
  .msg.user { background: #fff; border: 1px solid #e5e5e5; }
  .msg.assistant { background: #1a1a1a; color: #f0f0f0; }
  .msg.error { background: #fff0f0; border: 1px solid #fcc; color: #c00; }
  .msg-label { font-size: 11px; font-weight: 600; opacity: 0.5; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .dots { display: inline-flex; gap: 4px; align-items: center; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.4; animation: blink 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:0.9} }
</style>
</head>
<body>
<div class="container">
  <h1>Asistente Odoo</h1>
  <p class="subtitle">SexFun · Consultas en lenguaje natural sobre tus datos</p>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Verificando conexión...</span>
  </div>

  <div class="chips">
    <button class="chip" onclick="useChip(this)">¿A qué provincia facturamos más?</button>
    <button class="chip" onclick="useChip(this)">Top 5 clientes por monto facturado</button>
    <button class="chip" onclick="useChip(this)">Clientes con facturas sin pagar</button>
    <button class="chip" onclick="useChip(this)">Ventas del último mes</button>
    <button class="chip" onclick="useChip(this)">Productos con stock bajo</button>
  </div>

  <div class="input-area">
    <textarea id="query" placeholder="Escribí tu consulta en lenguaje natural..."></textarea>
    <div class="input-footer">
      <button class="send" id="send-btn" onclick="sendQuery()">Consultar →</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>
</div>

<script>
async function rpc(model, method, args, kwargs) {
  const resp = await fetch('/rpc', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, method, args, kwargs })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data.result;
}

async function fetchOdooData(query) {
  const q = query.toLowerCase();
  const data = {};

  if (q.includes('provincia') || q.includes('factur') || q.includes('cliente') || q.includes('venta') || q.includes('top') || q.includes('mes')) {
    const invoices = await rpc('account.move', 'search_read',
      [[['move_type','in',['out_invoice','out_refund']], ['state','=','posted']]],
      { fields: ['name','partner_id','amount_total','invoice_date','payment_state'], limit: 300, order: 'invoice_date desc' }
    );
    data.facturas = invoices;
    const ids = [...new Set(invoices.map(i => Array.isArray(i.partner_id) ? i.partner_id[0] : null).filter(Boolean))];
    if (ids.length) {
      data.clientes = await rpc('res.partner', 'search_read',
        [[['id','in',ids]]],
        { fields: ['id','name','state_id','country_id','city','vat'] }
      );
    }
  }

  if (q.includes('stock') || q.includes('producto') || q.includes('inventario') || q.includes('bajo')) {
    data.productos = await rpc('product.product', 'search_read',
      [[['type','=','product']]],
      { fields: ['name','qty_available','virtual_available','list_price'], limit: 150 }
    );
  }

  if (q.includes('pagar') || q.includes('deuda') || q.includes('pendiente') || q.includes('cobrar')) {
    data.pendientes = await rpc('account.move', 'search_read',
      [[['move_type','=','out_invoice'],['payment_state','in',['not_paid','partial']],['state','=','posted']]],
      { fields: ['name','partner_id','amount_total','amount_residual','invoice_date_due'], limit: 100 }
    );
  }

  if (q.includes('compra') || q.includes('proveedor')) {
    data.compras = await rpc('purchase.order', 'search_read',
      [[['state','in',['purchase','done']]]],
      { fields: ['name','partner_id','amount_total','date_order'], limit: 100 }
    );
  }

  return data;
}

async function askClaude(query, odooData) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: 'Sos un asistente de análisis de datos para SexFun, empresa argentina. Respondé en español, claro y conciso. Analizá solo los datos recibidos, nunca inventes. Si hay provincias argentinas, usá sus nombres completos. Presentá números y rankings ordenados.',
      messages: [{ role: 'user', content: `Consulta: "${query}"\n\nDatos de Odoo:\n${JSON.stringify(odooData, null, 2)}\n\nRespondé basándote únicamente en estos datos.` }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

function addMsg(type, html) {
  const wrap = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${type}`;
  const labels = { user: 'Tu consulta', assistant: 'Respuesta', error: 'Error' };
  d.innerHTML = `<div class="msg-label">${labels[type]}</div><div class="body">${html}</div>`;
  wrap.appendChild(d);
  d.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return d.querySelector('.body');
}

function useChip(btn) { document.getElementById('query').value = btn.textContent; }

async function sendQuery() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  document.getElementById('query').value = '';
  addMsg('user', query);
  const body = addMsg('assistant', '<div class="dots"><span></span><span></span><span></span></div> Obteniendo datos de Odoo...');
  try {
    const odooData = await fetchOdooData(query);
    body.innerHTML = '<div class="dots"><span></span><span></span><span></span></div> Analizando con IA...';
    const answer = await askClaude(query, odooData);
    body.innerHTML = answer.replace(/\n/g, '<br>');
  } catch (e) {
    body.closest('.msg').className = 'msg error';
    body.closest('.msg').querySelector('.msg-label').textContent = 'Error';
    body.innerHTML = e.message;
  }
  btn.disabled = false;
}

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

async function checkStatus() {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('status-text');
  try {
    const resp = await fetch('/health');
    const data = await resp.json();
    if (data.status === 'ok') {
      dot.className = 'dot green';
      txt.textContent = 'Conectado a sexfun.odoo.com via XML-RPC ✓';
    } else {
      throw new Error(data.message);
    }
  } catch (e) {
    dot.className = 'dot red';
    txt.textContent = 'Error: ' + e.message;
  }
}

checkStatus();
</script>
</body>
</html>
